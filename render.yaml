# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo → New Blueprint → apply render.yaml
services:
  - type: web
    name: plotcrm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: sqlite:///./data/plotcrm.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
